<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&family=Sen:wght@400;700;800&family=Baloo+2:wght@800&display=swap');


:root {
  --bg: #000;
  --redSolid: #E65C6E;
  --redTop: #F06A7A;
  --redMid: #E65C6E;
  --redBot: #D64A5D;
  --shine: rgba(255, 255, 255, 0.14);
}

* {
    margin: 0px;
    padding: 0px;
    box-sizing: border-box;
    font-family: 'Sen', sans-serif;
}

body {
    width: 100%;
    height: 100vh;
    background-color: #013243;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center; /* Keeps content centered in viewport */
    overflow: hidden;    /* Removes scrollbars */
}

body > img {
    position: absolute;
    z-index: -1;
    transform: scale(0.7);
}

/* Original Avatar Positions */
body > img:nth-child(1) { top: 50%; right: 60px; transform: translateY(-50%) scale(0.7); }
body > img:nth-child(2) { top: 40px; right: 60px; }
body > img:nth-child(3) { top: 90px; left: 60px; }
body > img:nth-child(4) { bottom: 25px; right: 60px; }
body > img:nth-child(5) { top: 75px; right: 250px; }

.section-main {
    width: 60%;
    height: 100%;
    padding: 40px 0px; /* Reduced padding to help fit viewport */
    display: flex;
    flex-direction: column;
    justify-content: center; 
    row-gap: 50px;
}

.section-main .section-content {
    display: flex;
    flex-direction: column;
    row-gap: 30px;
}

.section-main .section-content .section-title {
    font-size: 116px;
    color: #32f5c8;
    line-height: 115px;
    letter-spacing: 1px;
    width: 80%;
    font-weight: 700;
}

.section-main .section-content .section-text {
    color: #a9bdc6;
    font-size: 24px;
    line-height: 30px;
    width: 60%;
}

.section-main .section-content .section-link {
    width: fit-content;
    padding: 15px 30px;
    background: #32f5c8;
    color: #000;
    text-decoration: none;
    font-weight: bold;
    border-radius: 5px;
}

.section-main .section-content .section-social {
    display: flex;
    align-items: center;
    column-gap: 12px;
}

.section-main .section-content .section-social img { width: 35px; }
.section-main .section-content .section-social span { color: #a9bdc6; font-size: 18px; }

/* Responsive Logic (Kept your original breakpoints) */

@media only screen and (max-width: 1400px) {
    .section-main { width: 70%; }
}

@media only screen and (max-width: 1024px) {
    .section-main { width: 80%; }
    .section-main .section-content .section-title { font-size: 88px; width: 100%; line-height: 100px; }
    .section-main .section-content .section-text { width: 100%; }
}

@media only screen and (max-width: 800px) {
    .section-main .section-content .section-title { font-size: 70px; line-height: 75px; }
}

@media only screen and (max-width: 600px) {
    body { overflow-y: auto; } /* Mobile might need scroll if phone is very short */
    .section-main { width: 90%; padding: 40px 0px; row-gap: 40px; }
    .section-main .section-content .section-title { font-size: 45px; line-height: 50px; }
    .section-main .section-content .section-text { font-size: 20px; line-height: 26px; }
    
    /* Keep images but scale them down so they don't block text */
    body > img { transform: scale(0.4); }
    body > img:nth-child(2), body > img:nth-child(5) { display: none; }
}


.stage {
  padding: clamp(20px, 5vw, 60px);
}

/* 2. The Wordmark Container */
.word {
  display: flex;
  align-items: baseline;
  white-space: nowrap;
  font-family: "Baloo 2", sans-serif;
  font-weight: 800;
  font-size: clamp(100px, 18vw, 280px);
  line-height: 0.9;
  letter-spacing: -0.055em;
  transform: skewX(-8deg);
  filter: 
    drop-shadow(0 14px 0 rgba(0,0,0,0.33)) 
    drop-shadow(0 26px 50px rgba(0,0,0,0.50));
  position: relative;
  user-select: none;
}

/* 3. Individual Letters (Glyphs) */
.g {
  position: relative;
  display: inline-block;
  color: var(--redSolid);
  transform: skewX(8deg);
  transform-origin: 50% 80%;
}

/* Gradient Overlay */
.g::after {
  content: attr(data-ch);
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, var(--redTop) 0%, var(--redMid) 58%, var(--redBot) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  transform: scaleX(1.01) scaleY(1.006);
  filter: blur(0.12px);
  pointer-events: none;
}

/* 4. Kerning & Micro-Nudges */
.C { margin-right: -0.010em; transform: skewX(8deg) translateY(-0.006em) scaleX(1.01); }
.L { margin-right: -0.018em; transform: skewX(8deg) translateY(0.001em) scaleX(0.99); }
.E { margin-right: -0.020em; transform: skewX(8deg) translateY(-0.004em); }
.R { margin-right: -0.025em; transform: skewX(8deg); }
.B { transform: skewX(8deg) translateY(-0.002em) scaleX(0.95) scaleY(1.02); }

/* 5. Top Glossy Highlight */
.word::before {
  content: "";
  position: absolute;
  inset: -0.10em -0.05em auto -0.05em;
  height: 0.50em;
  border-radius: 999px;
  background: radial-gradient(120% 120% at 26% 35%, var(--shine) 0%, rgba(255,255,255,0) 60%);
  mix-blend-mode: screen;
  opacity: 0.45;
  transform: skewX(-12deg);
  pointer-events: none;
}

/* 6. Responsive Adjustments */
@media (max-width: 600px) {
  .word {
    font-size: clamp(80px, 20vw, 180px);
    letter-spacing: -0.060em;
    filter: drop-shadow(0 8px 0 rgba(0,0,0,0.34));
  }
}


</style>
