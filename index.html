  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800&family=Sen:wght@400;700;800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@800&display=swap');

    *{
      margin:0px;
      padding:0px;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
      font-family:'Sen',sans-serif;
    }

    body{
      width:100%;
      min-height:100vh;
      background-color:#013243;
      position:relative;
      display:flex;
      justify-content:center;
      overflow-x:hidden;
    }

    /* ===== Wordmark (same colour family as headline) ===== */
    :root{
      --tealSolid:#32f5c8;
      --tealTop:#45ffe0;
      --tealMid:#32f5c8;
      --tealBot:#1fe0b7;
      --shine: rgba(255,255,255,0.14);
    }

    .wordmark{
      user-select:none;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      display:inline-block;
    }

    .word{
      display:flex;
      align-items:baseline;
      white-space:nowrap;
      font-family:"Baloo 2", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      font-weight:800;
      font-size: 64px;
      line-height:0.9;
      letter-spacing:-0.055em;
      transform: skewX(-8deg);
      transform-origin: 50% 60%;
      filter:none;
      position:relative;
    }

    .g{
      position:relative;
      display:inline-block;
      color: var(--tealSolid);
      transform: skewX(8deg);
      transform-origin: 50% 80%;
    }

    .g::after{
      content: attr(data-ch);
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, var(--tealTop) 0%, var(--tealMid) 58%, var(--tealBot) 100%);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      transform: scaleX(1.010) scaleY(1.006);
      transform-origin: 50% 60%;
      filter: blur(0.12px);
      pointer-events:none;
      will-change: transform;
    }

    .C{ margin-right:-0.010em; }
    .L{ margin-right:-0.018em; }
    .E{ margin-right:-0.020em; }
    .R{ margin-right:-0.025em; }
    .B{ margin-right: 0em; }

    .C{ transform: skewX(8deg) translateY(-0.006em) scaleX(1.01); }
    .L{ transform: skewX(8deg) translateY(0.001em)  scaleX(0.99); }
    .E{ transform: skewX(8deg) translateY(-0.004em) scaleX(1.00); }
    .R{ transform: skewX(8deg) translateY(0em) scaleX(0.99); }
    .B{ transform: skewX(8deg) translateY(-0.002em) scaleX(0.95) scaleY(1.02); }

    .word::before{
      content:"";
      position:absolute;
      inset:-0.10em -0.05em auto -0.05em;
      height:0.50em;
      border-radius:999px;
      background: radial-gradient(120% 120% at 26% 35%, var(--shine) 0%, rgba(255,255,255,0.08) 22%, rgba(255,255,255,0.00) 60%);
      mix-blend-mode: screen;
      opacity:0.40;
      transform: skewX(-12deg);
      filter: blur(0.25px);
      pointer-events:none;
    }

    /* ===== Avatars (collision-safe sizing + move across screen) ===== */
    .avatar{
      position:absolute;
      z-index:-1;
      transform:none !important;
      width: var(--size, 86px);
      height: var(--size, 86px);
      pointer-events:none;
      will-change: translate, top, left;
      opacity:0.9;
      transition: left 420ms ease, top 420ms ease;
      translate: 0 0;
    }

    /* Each avatar gets a single translate animation (so it actually moves) */
    .avatar-1{ --size: 92px;  animation: move1 22s linear infinite; }
    .avatar-2{ --size: 84px;  animation: move2 26s linear infinite; }
    .avatar-3{ --size: 88px;  animation: move3 24s linear infinite; }
    .avatar-4{ --size: 90px;  animation: move4 30s linear infinite; }
    .avatar-5{ --size: 120px; animation: move5 28s linear infinite; }

    /* Big horizontal travel + small vertical wobble. Uses translate only. */
    @keyframes move1{
      0%{ translate:-22vw 0px; }
      25%{ translate:-8vw 10px; }
      50%{ translate:6vw -8px; }
      75%{ translate:16vw 6px; }
      100%{ translate:28vw 0px; }
    }
    @keyframes move2{
      0%{ translate:26vw 0px; }
      25%{ translate:12vw -10px; }
      50%{ translate:-2vw 8px; }
      75%{ translate:-14vw -6px; }
      100%{ translate:-30vw 0px; }
    }
    @keyframes move3{
      0%{ translate:-18vw 0px; }
      25%{ translate:-4vw -8px; }
      50%{ translate:10vw 10px; }
      75%{ translate:18vw -6px; }
      100%{ translate:30vw 0px; }
    }
    @keyframes move4{
      0%{ translate:30vw 0px; }
      25%{ translate:14vw 8px; }
      50%{ translate:0vw -10px; }
      75%{ translate:-16vw 6px; }
      100%{ translate:-32vw 0px; }
    }
    @keyframes move5{
      0%{ translate:-26vw 0px; }
      25%{ translate:-10vw 8px; }
      50%{ translate:6vw -8px; }
      75%{ translate:18vw 10px; }
      100%{ translate:34vw 0px; }
    }

    /* --- Layout --- */
    .section-main{
      width:60%;

    .section-content{

    .section-title{

      .avatar-4{ --size: 56px; }
      .avatar-5{ --size: 74px; }

      /* slightly smaller travel on mobile */
      @keyframes move1{ 0%{ translate:-16vw 0px; } 25%{ translate:-6vw 8px; } 50%{ translate:6vw -6px; } 75%{ translate:12vw 6px; } 100%{ translate:18vw 0px; } }
      @keyframes move2{ 0%{ translate:16vw 0px; } 25%{ translate:8vw -8px; } 50%{ translate:-2vw 6px; } 75%{ translate:-10vw -6px; } 100%{ translate:-18vw 0px; } }
      @keyframes move3{ 0%{ translate:-14vw 0px; } 25%{ translate:-4vw -6px; } 50%{ translate:6vw 8px; } 75%{ translate:12vw -6px; } 100%{ translate:18vw 0px; } }
      @keyframes move4{ 0%{ translate:18vw 0px; } 25%{ translate:10vw 6px; } 50%{ translate:0vw -8px; } 75%{ translate:-10vw 6px; } 100%{ translate:-18vw 0px; } }
      @keyframes move5{ 0%{ translate:-16vw 0px; } 25%{ translate:-6vw 6px; } 50%{ translate:4vw -6px; } 75%{ translate:12vw 8px; } 100%{ translate:20vw 0px; } }
    }

    @media (prefers-reduced-motion: reduce){
      .avatar{ animation:none !important; translate:0 0; }
      .section-link{ transition:none; }
    }
  </style>
</head>

  <script>
  (function () {
    const avatars = Array.from(document.querySelectorAll('.avatar'));
    const content = document.getElementById('content');
    const section = document.querySelector('.section-main');
    if (!avatars.length || !content || !section) return;

    function inflateRect(r, pad) { return { left: r.left - pad, top: r.top - pad, right: r.right + pad, bottom: r.bottom + pad }; }
    function rectsIntersect(a, b) { return !(a.right <= b.left || a.left >= b.right || a.bottom <= b.top || a.top >= b.bottom); }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function rng(seed){ let t = seed>>>0; return function(){ t+=0x6D2B79F5; let x=t; x=Math.imul(x^(x>>>15),x|1); x^=x+Math.imul(x^(x>>>7),x|61); return ((x^(x>>>14))>>>0)/4294967296; }; }

    function placeAvatars() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const safeContent = inflateRect(content.getBoundingClientRect(), vw <= 600 ? 36 : 48);
      const sectionRect = section.getBoundingClientRect();

      const anchors = (vw <= 600)
        ? [{x:0.10,y:0.22},{x:0.88,y:0.20},{x:0.92,y:0.52},{x:0.14,y:0.64},{x:0.22,y:0.84},{x:0.78,y:0.90},{x:0.60,y:0.78}]
        : [{x:0.12,y:0.16},{x:0.88,y:0.14},{x:0.92,y:0.48},{x:0.10,y:0.56},{x:0.22,y:0.82},{x:0.80,y:0.88},{x:0.64,y:0.80}];

      const sizes = avatars.map(a => a.getBoundingClientRect());
      const placed = [];

      avatars.forEach((a, i) => {
        const ar = sizes[i];
        const r = rng(1000 + i * 97);

        const gap = window.innerWidth <= 600 ? 26 : 34;
        const bleed = window.innerWidth <= 600 ? 10 : 18;

        let best = null;

        for (let k = 0; k < anchors.length; k++) {
          const idx = (k + i * 2) % anchors.length;
          const base = anchors[idx];

          for (let attempt = 0; attempt < 70; attempt++) {
            const jitterX = (r() - 0.5) * (window.innerWidth <= 600 ? 150 : 240);
            const jitterY = (r() - 0.5) * (window.innerWidth <= 600 ? 130 : 220);

            let left = (base.x * vw) - (ar.width / 2) + jitterX;
            let top  = (base.y * vh) - (ar.height / 2) + jitterY;

            left = clamp(left, -bleed, vw - ar.width + bleed);
            top  = clamp(top, -bleed, vh - ar.height + bleed);

            const test = { left, top, right: left + ar.width, bottom: top + ar.height };

            const withinSection =
              test.right > sectionRect.left &&
              test.left < sectionRect.right &&
              test.bottom > sectionRect.top &&
              test.top < sectionRect.bottom;

            if (!withinSection) continue;
            if (rectsIntersect(test, safeContent)) continue;

            const padded = inflateRect(test, gap);
            if (placed.some(p => rectsIntersect(padded, p))) continue;

            best = test;
            placed.push(padded);
            break;
          }
          if (best) break;
        }

        if (!best) {
          let left = clamp((0.84 * vw) - (ar.width / 2), 0, vw - ar.width);
          let top = clamp(safeContent.bottom + (window.innerWidth <= 600 ? 28 : 36), 0, vh - ar.height);
          best = { left, top, right: left + ar.width, bottom: top + ar.height };
        }

        a.style.left = best.left + 'px';
        a.style.top = best.top + 'px';
      });
    }

    function whenImagesReady(cb) {
      let pending = 0;
      function done(){ if (--pending <= 0) cb(); }
      avatars.forEach(img => {
        if (!(img instanceof HTMLImageElement)) return;
        if (img.complete && img.naturalWidth > 0) return;
        pending++;
        img.addEventListener('load', done, { once:true });
        img.addEventListener('error', done, { once:true });
      });
      if (pending === 0) cb();
    }

    let raf=null, t=null;
    function schedule(){ if (raf) cancelAnimationFrame(raf); raf = requestAnimationFrame(placeAvatars); }
    function debounce(){ if (t) clearTimeout(t); t = setTimeout(schedule, 120); }

    whenImagesReady(() => {
      schedule();
      window.addEventListener('resize', debounce, { passive:true });
      window.addEventListener('orientationchange', debounce, { passive:true });
    });
  })();
  </script>
